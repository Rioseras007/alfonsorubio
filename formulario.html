<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plantilla de Formulario</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .form-container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 40px 50px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #2c3e50;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #34495e;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #3498db;
            outline: none;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .checkbox-group, .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .checkbox-item, .radio-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #27ae60;
            color: white;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }

        button:hover {
            background: #219653;
        }

        .required::after {
            content: " *";
            color: #e74c3c;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>Formulario de Ejemplo</h1>
        
        <form id="miFormulario" action="#" method="POST">

            <div class="form-group">
                <label class="required">Nombre completo</label>
                <input type="text" name="nombre" required>
            </div>

            <div class="form-group">
                <label class="required">Correo electrónico</label>
                <input type="email" name="email" required>
            </div>

            <div class="form-group">
                <label>Teléfono</label>
                <input type="tel" name="telefono">
            </div>

            <div class="form-group">
                <label class="required">Contraseña</label>
                <input type="password" name="password" required>
            </div>

            <div class="form-group">
                <label>Fecha de nacimiento</label>
                <input type="date" name="fecha">
            </div>

            <div class="form-group">
                <label>Género</label>
                <div class="radio-group">
                    <label class="radio-item"><input type="radio" name="genero" value="masculino"> Masculino</label>
                    <label class="radio-item"><input type="radio" name="genero" value="femenino"> Femenino</label>
                    <label class="radio-item"><input type="radio" name="genero" value="otro"> Otro</label>
                </div>
            </div>

            <div class="form-group">
                <label>País</label>
                <select name="pais">
                    <option value="">Selecciona un país...</option>
                    <option value="es">España</option>
                    <option value="mx">México</option>
                    <option value="ar">Argentina</option>
                    <option value="co">Colombia</option>
                    <option value="otro">Otro</option>
                </select>
            </div>

            <div class="form-group">
                <label>Intereses</label>
                <div class="checkbox-group">
                    <label class="checkbox-item"><input type="checkbox" name="intereses" value="html"> HTML/CSS</label>
                    <label class="checkbox-item"><input type="checkbox" name="intereses" value="js"> JavaScript</label>
                    <label class="checkbox-item"><input type="checkbox" name="intereses" value="php"> PHP</label>
                    <label class="checkbox-item"><input type="checkbox" name="intereses" value="python"> Python</label>
                </div>
            </div>

            <div class="form-group">
                <label>Mensaje o comentarios</label>
                <textarea name="mensaje" placeholder="Escribe aquí tu mensaje..."></textarea>
            </div>

            <div class="form-group">
                <label>Adjuntar archivo</label>
                <input type="file" name="archivo">
            </div>

            <button type="submit">Enviar Formulario</button>
        </form>
    </div>
</body>
</html>
