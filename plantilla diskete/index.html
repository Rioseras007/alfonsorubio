<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Label Maker | Floppy Disk 1.44MB</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <h1><span class="retro-text">FLOPPY</span> LABEL MAKER</h1>
            <p class="subtitle">1.44 MB Diskette Edition</p>
        </header>

        <main>
            <section class="editor-section">
                <div class="glass-panel">
                    <h2>Configuración</h2>
                    
                    <div class="input-row">
                        <div class="input-group">
                            <label for="label-selector">Seleccionar Etiqueta</label>
                            <select id="label-selector">
                                <option value="all">Todas</option>
                                <option value="0">Etiqueta 1</option>
                                <option value="1">Etiqueta 2</option>
                                <option value="2">Etiqueta 3</option>
                                <option value="3">Etiqueta 4</option>
                                <option value="4">Etiqueta 5</option>
                                <option value="5">Etiqueta 6</option>
                                <option value="6">Etiqueta 7</option>
                                <option value="7">Etiqueta 8</option>
                                <option value="8">Etiqueta 9</option>
                                <option value="9">Etiqueta 10</option>
                            </select>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="label-title">Título Principal</label>
                        <input type="text" id="label-title" placeholder="Ej: DOOM II - DISK 1" maxlength="30">
                    </div>

                    <div class="input-group">
                        <label for="label-content">Contenido / Notas</label>
                        <textarea id="label-content" rows="3" placeholder="Archivos de sistema, datos..." maxlength="100"></textarea>
                    </div>

                    <div class="input-row">
                        <div class="input-group">
                            <label for="label-date">Fecha</label>
                            <input type="date" id="label-date">
                        </div>
                        <div class="input-group">
                            <label for="label-color">Color Acento</label>
                            <input type="color" id="label-color" value="#00f2ff">
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="label-image">Imagen de Fondo (Opcional)</label>
                        <div class="file-input-wrapper">
                            <input type="file" id="label-image" accept="image/*">
                        </div>
                    </div>

                    <div class="input-row">
                        <div class="input-group">
                            <label for="corner-radius">Esquinas (mm)</label>
                            <input type="range" id="corner-radius" min="0" max="10" step="0.5" value="0">
                            <span id="radius-val" class="range-val">0mm</span>
                        </div>
                        <div class="input-group">
                            <label for="line-width">Grosor Línea (mm)</label>
                            <input type="range" id="line-width" min="0.1" max="2" step="0.1" value="0.2">
                            <span id="width-val" class="range-val">0.2mm</span>
                        </div>
                    </div>

                    <div class="button-group">
                        <button id="generate-btn" class="primary-btn">Descargar PDF</button>
                    </div>
                </div>
            </section>

            <section class="preview-section">
                <div class="preview-container">
                    <div class="preview-header">
                        <span>Vista Previa (A4 - 10 etiquetas)</span>
                    </div>
                    <div id="labels-grid" class="labels-grid">
                        <!-- Labels will be injected here -->
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Retro Computing Lab</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
