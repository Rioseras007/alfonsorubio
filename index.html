<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">

    <title>Elementos Multimedia en una pagina web </title>
    <style>
        body {
            background: #0f172a;
            color: rgb(92, 108, 230);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 800px;
            padding: 20px;
            box-sizing: border-box;
        }

        .info {
            margin-bottom: 20px;
            text-align: center;
        }

        h2 {
            color: #850606;
            margin-bottom: 5px;
        }
    </style>


</head>

<body>
    <div class="info">
        <h2>Video de YouTube</h2>

    </div>

    <div class="container">

        <figure>

            <figcaption>Video de Youtube:</figcaption>

            <iframe width="560" height="315" src="https://www.youtube-nocookie.com/embed/PPOXTUL4ytk"
                title="YouTube video player" frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

        </figure>


        <h2>Archivo de música mp3</h2>


        <figure>

            <figcaption>Escucha el mejor tema musical del siglo XXI:</figcaption>

            <audio controls src="musica/audio.mp3" autoplay></audio>
            <a href="musica/audio.mp3"> Descarga gratis este temazo </a>

        </figure>


    </div>



    <footer>©️ Alfonso Rubio Rioseras 2026</footer>
</body>

</html>
