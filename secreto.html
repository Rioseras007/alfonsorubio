

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador teclado cajero</title> 
    <link rel="stylesheet" href="xstyle.css">

</head>
<body>

 <main

<div class="display"><label for="display" id="pantalla">*****</label></div> 

<div class="contenedor">


<div class="filas">
<button class="btn" type="button" onclick="escribir('1')">1 <sup>QZ</sup></button>
<button class="btn" type="button" onclick="escribir('2')">2 <sup>ABC</sup></button>
<button class="btn" type="button" onclick="escribir('3')">3 <sup>DEF</sup></button>
<button class="cancel" type="button" onclick="borrar()">CANCEL</button>
</div>

<div class="filas">
<button class="btn" type="button" onclick="escribir('4')">4 <sup>GHI</sup></button>
<button class="btn" type="button" onclick="escribir('5')">5 <sup>JKL</sup></button>
<button class="btn" type="button" onclick="escribir('6')">6 <sup>MNO</sup></button>
<button class="clear" type="button" onclick="limpiar()">CLEAR</button>
</div>

<div class="filas">
<button class="btn" type="button" onclick="escribir('7')">7 <sup>PQR</sup></button>
<button class="btn" type="button" onclick="escribir('8')">8 <sup>STU</sup></button>
<button class="btn" type="button" onclick="escribir('9')">9 <sup>VWX</sup></button>
<button class="enter" type="button" onclick="clave()">ENTER</button>
</div>

<div class="filas">
<button class="btn" type="button" onclick="escribir('.')">.</button>
<button class="btn" type="button" onclick="escribir('0')">0</button>
<button class="btn" type="button" onclick="escribir('-')">-</button>
<button class="btn" type="button" onclick="borrar()">&nbsp;</button>
</div>




</div>






</main>

</body>
<script src="xscript.js"></script>
</html>
