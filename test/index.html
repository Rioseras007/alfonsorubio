<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">

    <title>Elementos Multimedia en una pagina web </title>
    <style>
        body {
            background: #0f172a;
            color: rgb(92, 108, 230);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 800px;
            padding: 20px;
            box-sizing: border-box;
        }

        .info {
            margin-bottom: 20px;
            text-align: center;
        }

        h2 {
            color: #850606;
            margin-bottom: 5px;
        }


        .winamp-container {
            position: relative;
            width: 530px;
            height: 227px;
            margin: 20px auto;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            background: #000;
        }

        .winamp-mask {
            width: 100%;
            height: 100%;
            display: block;
            pointer-events: none;

        }

        .winamp-audio {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            opacity: 0.9;
            filter: invert(1) hue-rotate(180deg);

            transition: opacity 0.3s;
        }

        .winamp-audio:hover {
            opacity: 1;
        }
    </style>


</head>

<body>
    <div class="info">
        <h2>Video de YouTube</h2>

    </div>

    <div class="container">

        <figure>

            <figcaption>Video de Youtube:</figcaption>

            <iframe width="560" height="315" src="https://www.youtube-nocookie.com/embed/PPOXTUL4ytk"
                title="YouTube video player" frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

        </figure>


        <h2>Archivo de música mp3</h2>


        <figure>

            <figcaption>Escucha el mejor tema musical del siglo XXI:</figcaption>

            <div class="winamp-container">
                <img src="mascara.png" alt="Winamp Skin" class="winamp-mask">
                <audio controls src="musica/audio.mp3" autoplay class="winamp-audio"></audio>
            </div>

            <a href="musica/audio.mp3"
                style="display: block; margin-top: 10px; color: #60a5fa; text-decoration: none; font-weight: bold;">
                💾 Descarga gratis este temazo
            </a>

        </figure>


    </div>



    <footer>©️ Alfonso Rubio Rioseras 2026</footer>
</body>

</html>
