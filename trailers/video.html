<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Trailer SAga 007</title>
<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #000;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    overflow-x: hidden;
}
.contenedor {
    max-width: 1280px;
    width: 100%;
    margin: 20px auto;
    text-align: center;
    position: relative;
}
.video-wrapper {
    position: relative;
    padding-bottom: 56.25%;
    height: 0;
    overflow: hidden;
    margin-bottom: 20px;
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(255,255,255,0.2);
}
video {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border-radius: 8px;
}
.controls {
    margin-bottom: 15px;
    display: flex;
    gap: 10px;
    justify-content: center;
    opacity: 0.8;
    transition: opacity 0.3s;
}
.controls button {
    background: #111;
    color: #fff;
    border: none;
    padding: 10px 20px;
    cursor: pointer;
    border-radius: 5px;
    transition: background 0.3s, transform 0.2s;
}
.controls button:hover {
    background: #333;
    transform: scale(1.05);
}
.playlist {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    justify-content: center;
    transition: opacity 0.5s;
}
.playlist div {
    cursor: pointer;
    text-align: center;
    transition: transform 0.2s;
}
.playlist img {
    width: 120px;
    height: 70px;
    object-fit: cover;
    border-radius: 8px;
    border: 2px solid transparent;
}
.playlist div:hover img {
    border-color: #fff;
    transform: scale(1.05);
}
.playlist p {
    margin: 5px 0 0 0;
    font-size: 0.85rem;
}
body.cine .controls,
body.cine .playlist {
    opacity: 0;
    pointer-events: none;
}
</style>
</head>
<body>
    <h1 align=""center">TRAILERS DE LA SAGA 007 (1962-2022)</h1>

<div class="contenedor">
    <div class="video-wrapper">
        <video id="reproductor" controls autoplay muted playsinline>
            <source id="video-source" src="dr-no.mp4" type="video/mp4">
        </video>
    </div>

    <div class="controls">
        <button onclick="anterior()">⏮ Anterior</button>
        <button onclick="siguiente()">Siguiente ⏭</button>
    </div>

    <div class="playlist" id="playlist"></div>
</div>

<script>
const videos = [
{src:"dr-no.mp4", title:"Dr. No", thumb:"miniaturas/dr-no.jpg"},
{src:"from-russia-with-love.mp4", title:"From Russia with Love", thumb:"miniaturas/from-russia-with-love.jpg"},
{src:"goldfinger.mp4", title:"Goldfinger", thumb:"miniaturas/goldfinger.jpg"},
{src:"thunderball.mp4", title:"Thunderball", thumb:"miniaturas/thunderball.jpg"},
{src:"you-only-live-twice.mp4", title:"You Only Live Twice", thumb:"miniaturas/you-only-live-twice.jpg"},
{src:"on-her-majestys-secret-service.mp4", title:"On Her Majesty's Secret Service", thumb:"miniaturas/on-her-majestys-secret-service.jpg"},
{src:"diamonds-are-forever.mp4", title:"Diamonds Are Forever", thumb:"miniaturas/diamonds-are-forever.jpg"},
{src:"live-and-let-die.mp4", title:"Live and Let Die", thumb:"miniaturas/live-and-let-die.jpg"},
{src:"the-man-with-the-golden-gun.mp4", title:"The Man with the Golden Gun", thumb:"miniaturas/the-man-with-the-golden-gun.jpg"},
{src:"the-spy-who-loved-me.mp4", title:"The Spy Who Loved Me", thumb:"miniaturas/the-spy-who-loved-me.jpg"},
{src:"moonraker.mp4", title:"Moonraker", thumb:"miniaturas/moonraker.jpg"},
{src:"for-your-eyes-only.mp4", title:"For Your Eyes Only", thumb:"miniaturas/for-your-eyes-only.jpg"},
{src:"octopussy.mp4", title:"Octopussy", thumb:"miniaturas/octopussy.jpg"},
{src:"a-view-to-a-kill.mp4", title:"A View to a Kill", thumb:"miniaturas/a-view-to-a-kill.jpg"},
{src:"the-living-daylights.mp4", title:"The Living Daylights", thumb:"miniaturas/the-living-daylights.jpg"},
{src:"licence-to-kill.mp4", title:"Licence to Kill", thumb:"miniaturas/licence-to-kill.jpg"},
{src:"goldeneye.mp4", title:"GoldenEye", thumb:"miniaturas/goldeneye.jpg"},
{src:"tomorrow-never-dies.mp4", title:"Tomorrow Never Dies", thumb:"miniaturas/tomorrow-never-dies.jpg"},
{src:"the-world-is-not-enough.mp4", title:"The World Is Not Enough", thumb:"miniaturas/the-world-is-not-enough.jpg"},
{src:"die-another-day.mp4", title:"Die Another Day", thumb:"miniaturas/die-another-day.jpg"},
{src:"casino-royale.mp4", title:"Casino Royale", thumb:"miniaturas/casino-royale.jpg"},
{src:"quantum-of-solace.mp4", title:"Quantum of Solace", thumb:"miniaturas/quantum-of-solace.jpg"},
{src:"skyfall.mp4", title:"Skyfall", thumb:"miniaturas/skyfall.jpg"},
{src:"spectre.mp4", title:"Spectre", thumb:"miniaturas/spectre.jpg"},
{src:"no-time-to-die.mp4", title:"No Time to Die", thumb:"miniaturas/no-time-to-die.jpg"}
];

let indiceActual = 0;
const reproductor = document.getElementById("reproductor");
const fuente = document.getElementById("video-source");
const playlistDiv = document.getElementById("playlist");

reproductor.volume = 0.8;

function cargarVideo(i){
    indiceActual = i;
    fuente.src = videos[i].src;
    reproductor.load();
    reproductor.play();
}

function siguiente(){
    cargarVideo((indiceActual + 1) % videos.length);
}

function anterior(){
    cargarVideo((indiceActual - 1 + videos.length) % videos.length);
}

videos.forEach((video, i) => {
    const div = document.createElement("div");
    div.onclick = () => cargarVideo(i);
    const img = document.createElement("img");
    img.src = video.thumb;
    const p = document.createElement("p");
    p.textContent = video.title;
    div.appendChild(img);
    div.appendChild(p);
    playlistDiv.appendChild(div);
});

reproductor.addEventListener('play', () => document.body.classList.add('cine'));
reproductor.addEventListener('pause', () => document.body.classList.remove('cine'));
reproductor.addEventListener('ended', () => document.body.classList.remove('cine'));
</script>

</body>
</html>
