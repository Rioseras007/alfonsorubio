    <title>Navegación Gradient Moderno</title>
    <style>
        /* ===== RESET SUAVE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ===== BARRA DE NAVEGACIÓN ===== */
        nav {
            width: 100%;
            padding: 16px 30px;

            position: fixed;
            top: 0;
            left: 0px;
            z-index: 2;

            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;

            backdrop-filter: blur(12px);

            background: linear-gradient(135deg,
                    #065206,
                    #29b36b,
                    #2fe356,
                    #059435);

            background-size: 300% 300%;
            animation: gradientMove 10s ease infinite;
            border:#141414 2px solid;

           
            border-radius: 20px;
            border-top:  #101010 2px solid;
            border-bottom: #101010 5px solid;
            border-left:  #101010 2px solid;
            border-right:  #101010 2px solid;


            box-shadow:
                0 4px 20px rgba(0, 0, 0, 0.25),
                0 0 15px rgba(72, 236, 165, 0.25);
        }

        /* ===== ANIMACIÓN DEL FONDO ===== */
        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* ===== ENLACES ===== */
        nav a {
            position: relative;

            color: rgb(232, 233, 248);
            text-decoration: none;

            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.5px;

            padding: 10px 18px;
            border-radius: 12px;

            transition:
                transform 0.25s ease,
                background 0.25s ease,
                box-shadow 0.25s ease;
        }

        /* ===== EFECTO HOVER ===== */
        nav a:hover {
            transform: translateY(-3px);

            background: rgba(255, 255, 255, 0.15);

            box-shadow:
                0 4px 12px rgba(5, 177, 57, 0.393),
                0 0 12px rgba(255, 255, 255, 0.4);
        }

        /* ===== EFECTO ACTIVO ===== */
        nav a:active {
            transform: scale(1.1);
        }

        /* ===== LÍNEA ANIMADA ===== */
        nav a::after {
            content: "";

            position: absolute;
            left: 50%;
            bottom: 4px;

            width: 0%;
            height: 3px;

            background: rgb(231, 13, 13);

            transition: 0.3s ease;
            transform: translateX(-50%);
        }

        nav a:hover::after {
            width: 90%;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {

            nav {
                gap: 10px;
                padding: 14px 10px;
                flex-wrap: wrap;
            }

            nav a {
                font-size: 1.5rem;
                padding: 8px 14px;
            }
        }
    </style>

</head>
